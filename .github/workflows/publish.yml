name: Publish Packages

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only run if CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: npm
    permissions:
      contents: read
      id-token: write # Required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"

      - name: Use pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Detect unpublished versions
        id: detect
        run: |
          check_version_change() {
            local package_path=$1
            local package_name=$2
            local npm_name=$3

            current_version=$(node -p "require('./${package_path}/package.json').version")
            published_version=$(npm view ${npm_name} version 2>/dev/null || echo "none")

            if [ "$current_version" != "$published_version" ]; then
              echo "📦 ${npm_name}: ${published_version} → ${current_version}"
              echo "${package_name}=true" >> $GITHUB_OUTPUT
            else
              echo "⏭️  ${npm_name}: ${current_version} (already published)"
              echo "${package_name}=false" >> $GITHUB_OUTPUT
            fi
          }

          echo "Checking for unpublished versions..."
          check_version_change "packages/utils" "utils" "@blibliki/utils"
          check_version_change "packages/transport" "transport" "@blibliki/transport"
          check_version_change "packages/engine" "engine" "@blibliki/engine"
          check_version_change "packages/models" "models" "@blibliki/models"
          check_version_change "packages/pi" "pi" "@blibliki/pi"

      - name: Build all packages
        if: steps.detect.outputs.utils == 'true' || steps.detect.outputs.transport == 'true' || steps.detect.outputs.engine == 'true' || steps.detect.outputs.models == 'true' || steps.detect.outputs.pi == 'true'
        run: pnpm build:packages

      - name: Publish @blibliki/utils
        if: steps.detect.outputs.utils == 'true'
        working-directory: ./packages/utils
        run: |
          echo "Publishing @blibliki/utils..."
          pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish @blibliki/transport
        if: steps.detect.outputs.transport == 'true'
        working-directory: ./packages/transport
        run: |
          echo "Publishing @blibliki/transport..."
          pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish @blibliki/engine
        if: steps.detect.outputs.engine == 'true'
        working-directory: ./packages/engine
        run: |
          echo "Publishing @blibliki/engine..."
          pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish @blibliki/models
        if: steps.detect.outputs.models == 'true'
        working-directory: ./packages/models
        run: |
          echo "Publishing @blibliki/models..."
          pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish @blibliki/pi
        if: steps.detect.outputs.pi == 'true'
        working-directory: ./packages/pi
        run: |
          echo "Publishing @blibliki/pi..."
          pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Summary
        if: steps.detect.outputs.utils == 'true' || steps.detect.outputs.transport == 'true' || steps.detect.outputs.engine == 'true' || steps.detect.outputs.models == 'true' || steps.detect.outputs.pi == 'true'
        run: |
          echo "### 📦 Published Packages" >> $GITHUB_STEP_SUMMARY
          [ "${{ steps.detect.outputs.utils }}" == "true" ] && echo "- ✅ @blibliki/utils" >> $GITHUB_STEP_SUMMARY || true
          [ "${{ steps.detect.outputs.transport }}" == "true" ] && echo "- ✅ @blibliki/transport" >> $GITHUB_STEP_SUMMARY || true
          [ "${{ steps.detect.outputs.engine }}" == "true" ] && echo "- ✅ @blibliki/engine" >> $GITHUB_STEP_SUMMARY || true
          [ "${{ steps.detect.outputs.models }}" == "true" ] && echo "- ✅ @blibliki/models" >> $GITHUB_STEP_SUMMARY || true
          [ "${{ steps.detect.outputs.pi }}" == "true" ] && echo "- ✅ @blibliki/pi" >> $GITHUB_STEP_SUMMARY || true
